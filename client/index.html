<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>WolfApis - Multi-Provider API Hub</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function(){
        document.addEventListener('contextmenu',function(e){e.preventDefault();});
        document.addEventListener('keydown',function(e){
          if(e.key==='F12')e.preventDefault();
          if(e.ctrlKey&&e.shiftKey&&['I','J','C'].includes(e.key.toUpperCase()))e.preventDefault();
          if(e.ctrlKey&&e.key.toUpperCase()==='U')e.preventDefault();
          if(e.metaKey&&e.altKey&&['I','J','C'].includes(e.key.toUpperCase()))e.preventDefault();
        });
        (function d(){try{(function(){return false;}).constructor('debugger')();} catch(e){}setTimeout(d,100);})();
        var t=new Image();Object.defineProperty(t,'id',{get:function(){document.title='WolfAPIs';window.location.reload();}});
        var c=console;['log','warn','error','info','debug','table','trace','dir','dirxml','group','groupEnd','time','timeEnd','assert','count','clear'].forEach(function(m){c[m]=function(){};});
        Object.defineProperty(window,'console',{get:function(){return c;},set:function(){}});
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
